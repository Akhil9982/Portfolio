function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) el.classList.add('in'); }),
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function Reveal({ children, className = '', delay = 0 }) {
  const ref = useReveal();
  return (
    <div ref={ref} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>
      {children}
    </div>
  );
}

function BootPanel() {

  useEffect(() => {
    if (shown >= lines.length) return;
    const t = setTimeout(() => setShown((s) => s + 1), 480);
    return () => clearTimeout(t);
  }, [shown]);

  return (
    <div className="font-mono text-[13px] sm:text-sm leading-relaxed">
      {lines.slice(0, shown).map((l, i) => (
        <div key={l.k} className="flex flex-wrap gap-2">

          <span className="text-amber">{l.k}</span>
          <span className="text-lo">→</span>
          <span className={i === shown - 1 ? 'text-hi blink' : 'text-hi'}>{l.v}</span>
        </div>
      ))}
    </div>
  );
}

          <span className="font-mono text-[12px] text-lo">{e.range}</span>
          <StatusChip color={e.tagColor}>{e.tag}</StatusChip>
        </div>
        <h3 className="font-display text-lg font-semibold text-hi">{e.role}</h3>
        <p className="font-mono text-[12px] text-lo mt-0.5">{e.org}</p>

        {e.intro && <p className="text-[13px] text-lo mt-3 italic">{e.intro}</p>}

        {e.subgroups ? (
          <div className="mt-4 space-y-4">
            {e.subgroups.map((sg) => (
              <div key={sg.label} className="pl-4 border-l border-edge">
                <div className="flex flex-wrap items-baseline gap-2">
                  <span className="font-mono text-[11px] text-teal">{sg.label}</span>
                  <span className="font-mono text-[10.5px] text-lo">{sg.range}</span>
                </div>
                <ul className="mt-2 space-y-1.5">
                  {sg.bullets.map((b, i) => (
                    <li key={i} className="text-[13px] text-hi/85 flex gap-2">
                      <span className="text-amber mt-0.5">▸</span><span>{b}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        ) : (
          <ul className="mt-3 space-y-1.5">
            {e.bullets.map((b, i) => (
              <li key={i} className="text-[13px] text-hi/85 flex gap-2">
                <span className="text-amber mt-0.5">▸</span><span>{b}</span>
              </li>
            ))}
          </ul>
        )}

        <div className="flex flex-wrap gap-1.5 mt-4">
          {e.chips.map((c) => <span key={c} className="font-mono text-[10px] px-2 py-0.5 rounded border border-edge text-lo">{c}</span>)}
        </div>
      </div>
    </Reveal>
  );
}
